events { worker_connections 1024; }

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m    rate=20r/m;

    limit_req_status 429;
    limit_conn_status 429;

    upstream api       { server api:8000; }
    upstream dashboard { server dashboard:3000; }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options              "DENY"                              always;
        add_header X-Content-Type-Options       "nosniff"                           always;
        add_header X-XSS-Protection             "1; mode=block"                     always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy           "geolocation=(), microphone=()"     always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://unpkg.com; connect-src 'self' ws: wss:;"
            always;

        server_tokens off;

        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            limit_req zone=ws_limit burst=10 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
        }

        location / {
            proxy_pass http://dashboard;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
